name: Task
description: A unit of planned work (port, feature, infra, test, docs, research)
title: "<outcome-oriented title>"
labels: []
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: One paragraph, outcome-oriented. What is true when this is done?
    validations:
      required: true
  - type: textarea
    id: upstream
    attributes:
      label: Upstream reference
      description: Exact upstream/package/src/… paths (and line ranges where useful). Run ./scripts/upstream.sh if upstream/ is missing. Write "n/a" for infra work.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Objectively verifiable checkboxes (tests pass, fixture parity, playground behavior).
      value: |
        - [ ]
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: What NOT to do, to keep the PR small.
  - type: textarea
    id: notes
    attributes:
      label: Notes / pointers
